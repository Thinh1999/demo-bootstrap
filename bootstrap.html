<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile Card</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-info-subtle">
    <div class="container mt-5">
      <div
        class="card shadow mx-auto text-center p-4 rounded-4"
        style="max-width: 360px"
      >
        <img
          class="rounded-circle border border-primary border-4 mx-auto mb-3"
          src="avt.png"
          alt="Ảnh Đại diện"
          width="150"
          height="150"
        />
 
        <div class="card-body">
          <h1 class="h3 text-dark">Nguyễn Nhựt Thịnh</h1>
          <p class="text-secondary">Sinh viên Khoa Công nghệ Thông tin</p>
 
          <div class="mb-4">
            <span class="badge rounded-pill text-bg-primary">HTML</span>
            <span class="badge rounded-pill text-bg-primary">CSS</span>
            <span class="badge rounded-pill text-bg-primary">JavaScript</span>
          </div>
        </div>
 
        <button class="btn btn-primary">Xem hồ sơ</button>
      </div>
    </div>
  </body>
</html>
